<div class="restaurant-details" *ngIf="foodItemResponse">

  <div class="restaurant-header">
    <h1>{{ foodItemResponse.restaurant.name }}</h1>

    <button class="checkout-button" (click)="onCheckOut()">
      Checkout
    </button>
  </div>

  <p class="restaurant-description">
    {{ foodItemResponse.restaurant.restaurantDescription }}
  </p>

  <h2 class="menu-title">Food Menu</h2>

  <div class="food-list">
    <div
      class="food-item"
      *ngFor="let food of foodItemResponse.foodItemsList"
    >
      <div class="food-details">
        <div class="food-name">{{ food.itemName }}</div>
        <div class="food-price">₹ {{ food.price }}</div>
      </div>

      <div class="food-quantity">
        <button
          class="minus-button"
          *ngIf="food.quantity > 0"
          (click)="decrement(food)"
        >
          −
        </button>

        <div class="quantity-label">{{ food.quantity }}</div>

        <button
          class="plus-button"
          (click)="increment(food)"
        >
          +
      </button>
      </div>
    </div>
  </div>

</div>
