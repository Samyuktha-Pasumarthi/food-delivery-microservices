name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-services:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build Eureka Service
        run: |
          cd eureka
          mvn clean install

      - name: Build Food Catalogue Service
        run: |
          cd foodcatalogue
          mvn clean install

      - name: Build Order Service
        run: |
          cd order
          mvn clean install

      - name: Build Restaurant Service
        run: |
          cd restaurantlisting
          mvn clean install

      - name: Build User Service
        run: |
          cd userinfo
          mvn clean install
