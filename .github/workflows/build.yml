name: Build and Test

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build restaurant service
        run: |
          cd restaurantlisting
          mvn clean install

      - name: Run tests
        run: |
          cd restaurantlisting
          mvn test
